<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>龙哥的起始页 · loongworld</title>
<link rel="icon" href="favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;
  --card:rgba(255,255,255,.06);
  --card-hover:rgba(255,255,255,.10);
  --border:rgba(255,255,255,.08);
  --text:#e8ecf1;
  --text-dim:#8b95a5;
  --accent:#6c9cff;
  --accent-glow:rgba(108,156,255,.25);
  --radius:14px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:32px 24px;
  position:relative;
  overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 60% 50% at 20% 10%,rgba(108,156,255,.10),transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 90%,rgba(140,90,255,.08),transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 50%,rgba(20,30,50,.5),transparent 70%);
  pointer-events:none;
  animation:bgPulse 18s ease-in-out infinite alternate;
}
@keyframes bgPulse{0%{transform:scale(1)}100%{transform:scale(1.1)}}

.topbar{
  position:fixed;top:0;left:0;right:0;
  padding:14px 24px;
  display:flex;justify-content:space-between;align-items:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  background:rgba(10,14,23,.5);
  border-bottom:1px solid var(--border);
  z-index:50;
}
.brand{font-size:14px;letter-spacing:2px;color:var(--text-dim)}
.brand b{color:var(--accent);font-weight:600}
.brand .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:8px;vertical-align:middle;box-shadow:0 0 10px var(--accent)}
.topbar-actions{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--text-dim)}
.time-zone{cursor:pointer;padding:4px 10px;border-radius:6px;transition:.2s}
.time-zone:hover{background:var(--card)}
.weather-mini{display:flex;align-items:center;gap:6px;cursor:pointer}
.weather-mini:hover{opacity:.7}

.main{padding-top:60px;max-width:1000px;margin:0 auto}

.clock-section{text-align:center;margin:40px 0 36px}
.clock-time{
  font-size:88px;font-weight:200;letter-spacing:4px;
  background:linear-gradient(135deg,#6c9cff,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-variant-numeric:tabular-nums;
}
.clock-date{margin-top:6px;font-size:16px;color:var(--text-dim);letter-spacing:1px}
.clock-date .lunar{margin-left:12px;padding:2px 10px;border:1px solid var(--border);border-radius:20px;font-size:12px}

.search-wrap{margin:0 auto 40px;max-width:640px}
.search-engines{display:flex;justify-content:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.engine-btn{
  padding:6px 16px;border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;transition:.2s;
}
.engine-btn:hover{background:var(--card);color:var(--text)}
.engine-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 16px var(--accent-glow)}
.search-box{
  position:relative;display:flex;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 18px;transition:.25s;
}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);background:rgba(255,255,255,.08)}
.search-box svg{flex-shrink:0;margin-right:12px;opacity:.4}
.search-box input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:16px;padding:4px 0}
.search-box input::placeholder{color:var(--text-dim)}
.search-box .kbd-hint{font-size:11px;color:var(--text-dim);padding:2px 6px;border:1px solid var(--border);border-radius:4px;margin-left:10px}

.nav-section{margin-bottom:36px}
.nav-category{margin-bottom:24px}
.cat-title{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--text-dim);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:12px;padding:0 4px;
}
.cat-title::after{content:"";flex:1;height:1px;background:var(--border)}
.nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:12px;
  background:var(--card);border:1px solid var(--border);
  text-decoration:none;color:var(--text);transition:.2s;overflow:hidden;position:relative;
}
.nav-item:hover{background:var(--card-hover);border-color:rgba(255,255,255,.14);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:rgba(255,255,255,.05)}
.nav-label{font-size:14px;font-weight:500;display:flex;flex-direction:column;min-width:0}
.nav-label small{font-size:11px;color:var(--text-dim);font-weight:400;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.footer{text-align:center;padding:30px 0 10px;font-size:12px;color:var(--text-dim);letter-spacing:1px}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
.theme-toggle{cursor:pointer;background:none;border:none;color:var(--text-dim);font-size:18px;padding:4px}

@media(max-width:600px){
  .clock-time{font-size:56px}
  .topbar{padding:12px 16px}
  .topbar-actions{font-size:12px;gap:10px}
  .nav-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .main{padding-top:50px}
}
@media(max-width:420px){
  .nav-grid{grid-template-columns:1fr 1fr}
  .clock-time{font-size:46px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span><b>LOONGWORLD</b> · 起始页</div>
  <div class="topbar-actions">
    <div class="time-zone" id="tzDisplay">UTC+8</div>
    <div class="weather-mini" id="weatherMini" title="点击切换城市">
      <span id="wmIcon">🌤️</span>
      <span id="wmTemp">--°</span>
    </div>
    <button class="theme-toggle" id="themeBtn" title="切换主题">🌙</button>
  </div>
</div>

<div class="main">
  <div class="clock-section">
    <div class="clock-time" id="clockTime">00:00</div>
    <div class="clock-date">
      <span id="clockDate">--</span>
      <span class="lunar" id="lunar">--</span>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-engines" id="engineList">
      <button class="engine-btn active" data-engine="baidu">百度</button>
      <button class="engine-btn" data-engine="bing">Bing</button>
      <button class="engine-btn" data-engine="google">Google</button>
      <button class="engine-btn" data-engine="sogou">搜狗</button>
      <button class="engine-btn" data-engine="duckduckgo">DDG</button>
      <button class="engine-btn" data-engine="perplexity">Perplexity</button>
    </div>
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜索互联网..." autofocus autocomplete="off">
      <span class="kbd-hint">⏎</span>
    </div>
  </div>

  <div class="nav-section" id="navSection"></div>

  <div class="footer">
    <a href="https://github.com/loongworld" target="_blank">@loongworld</a> &nbsp;·&nbsp; 始于好奇心
  </div>
</div>

<script>
const ENGINES = {
  baidu:      {url:'https://www.baidu.com/s?wd='},
  bing:       {url:'https://www.bing.com/search?q='},
  google:     {url:'https://www.google.com/search?q='},
  sogou:      {url:'https://www.sogou.com/web?query='},
  duckduckgo: {url:'https://duckduckgo.com/?q='},
  perplexity: {url:'https://perplexity.ai/search?q='},
};
let currentEngine = 'baidu';

document.getElementById('engineList').addEventListener('click', e => {
  const btn = e.target.closest('.engine-btn');
  if (!btn) return;
  currentEngine = btn.dataset.engine;
  document.querySelectorAll('.engine-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  window.open(ENGINES[currentEngine].url + encodeURIComponent(q), '_blank');
}
document.getElementById('searchInput').addEventListener('keydown', ev => {
  if (ev.key === 'Enter') doSearch();
});

function pad(n){return String(n).padStart(2,'0')}
function tick(){
  const now = new Date();
  document.getElementById('clockTime').textContent = pad(now.getHours())+':'+pad(now.getMinutes());
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('clockDate').textContent =
    `${now.getFullYear()}年${pad(now.getMonth()+1)}月${pad(now.getDate())}日 ${days[now.getDay()]}`;
  document.getElementById('lunar').textContent = getLunar(now);
}
const LUNAR_BASE = {
  2025:{'2025-01-29':'正月初一','2025-02-22':'闰六月初五','2025-03-29':'七月初八','2025-04-27':'七月廿六','2025-05-26':'八月初四','2025-06-24':'八月廿三','2025-07-24':'九月初二','2025-08-22':'九月三十','2025-09-21':'十月三十','2025-10-21':'冬月初一','2025-11-20':'冬月三十','2025-12-20':'腊月初二'},
  2026:{'2026-02-17':'正月初一','2026-03-18':'正月廿十','2026-04-16':'二月十九','2026-05-16':'三月初一','2026-06-14':'三月初十','2026-07-14':'四月十一','2026-08-12':'五月十一','2026-09-11':'六月十','2026-10-11':'七月初一','2026-11-10':'七月初十','2026-12-10':'八月初一'},
};
function getLunar(d){
  const ds = d.toISOString().slice(0,10);
  const y = LUNAR_BASE[d.getFullYear()];
  if(!y) return '农历';
  let best=null,bestD=9999;
  for(const [key,val] of Object.entries(y)){
    const diff=Math.abs(new Date(ds)-new Date(key));
    if(diff<bestD){bestD=diff;best=val}
  }
  return best||'农历';
}
tick();setInterval(tick,1000);

let WEATHER_CITY = localStorage.getItem('weatherCity') || '北京';
async function fetchWeather(){
  try{
    const key = '0f005e157f4a4a5a8e8202607241008';
    const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${WEATHER_CITY}&appid=${key}&units=metric&lang=zh_cn`);
    const d = await r.json();
    if(!d.main) return;
    const t = Math.round(d.main.temp);
    const desc = d.weather[0].main;
    const icons = {'Clear':'☀️','Clouds':'⛅','Rain':'🌧️','Thunderstorm':'⛈️','Snow':'❄️','Mist':'🌫️','Fog':'🌫️'};
    document.getElementById('wmIcon').textContent = icons[desc]||'🌤️';
    document.getElementById('wmTemp').textContent = t+'°';
    document.title = `${t}° ${WEATHER_CITY} · 龙哥的起始页`;
  }catch(e){}
}
fetchWeather();
document.getElementById('weatherMini').addEventListener('click', () => {
  const newCity = prompt('输入城市名（如：上海 / 广州 / 成都）', WEATHER_CITY);
  if(newCity && newCity.trim()){
    localStorage.setItem('weatherCity', newCity.trim());
    WEATHER_CITY = newCity.trim();
    fetchWeather();
  }
});

const THEMES = {
  light:{bg:'#f0f2f5',card:'rgba(255,255,255,.7)',cardHover:'rgba(255,255,255,.9)',border:'rgba(0,0,0,.06)',text:'#1a1a2e',textDim:'#6b7280',accent:'#3b82f6'}
};
let isLight=false;
document.getElementById('themeBtn').addEventListener('click', ()=>{
  isLight=!isLight;
  if(isLight){
    const t=THEMES.light;
    document.documentElement.style.setProperty('--bg',t.bg);
    document.documentElement.style.setProperty('--card',t.card);
    document.documentElement.style.setProperty('--card-hover',t.cardHover);
    document.documentElement.style.setProperty('--border',t.border);
    document.documentElement.style.setProperty('--text',t.text);
    document.documentElement.style.setProperty('--text-dim',t.textDim);
    document.documentElement.style.setProperty('--accent',t.accent);
    document.getElementById('themeBtn').textContent='☀️';
  }else{
    ['bg','card','card-hover','border','text','text-dim','accent'].forEach(p=>document.documentElement.style.removeProperty('--'+p));
    document.getElementById('themeBtn').textContent='🌙';
  }
  localStorage.setItem('theme',isLight?'light':'dark');
});
if(localStorage.getItem('theme')==='light'){document.getElementById('themeBtn').click();}

    {n:'知乎',s:'知识问答',i:'💬',u:'https://www.zhihu.com'},
    {n:'豆瓣',s:'书影音',i:'⭐',u:'https://book.douban.com'},
  ]},
  {cat:'✨ 小众精品', items:[
    {n:'Letterboxd',s:'影迷日记',i:'🎬',u:'https://letterboxd.com'},
    {n:'ProductHunt',s:'新产品发现',i:'🚀',u:'https://producthunt.com'},
    {n:'IndieDB',s:'独立游戏社区',i:'🎮',u:'https://www.indiedb.com'},
    {n:'ReadPeed',s:'中文科技简报',i:'📰',u:'https://read.peed.wiki'},
    {n:'1911',s:'每日头条',i:'🔥',u:'https://1911cc.com'},
    {n:'Hacker News',s:'HN 技术头条',i:'🧭',u:'https://news.ycombinator.com'},
  ]},
];

function renderNav(){
  const sec = document.getElementById('navSection');
  sec.innerHTML = NAV.map(c=>`
    <div class="nav-category">
      <div class="cat-title">${c.cat}</div>
      <div class="nav-grid">
        ${c.items.map(it=>`
          <a class="nav-item" href="${it.u}" target="_blank">
            <div class="nav-icon">${it.i}</div>
            <div class="nav-label"><b>${it.n}</b><small>${it.s}</small></div>
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');
}
renderNav();
</script>
</body>
</html>
