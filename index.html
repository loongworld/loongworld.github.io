<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万里千寻 - 龙哥的起始页</title>
    <link rel="icon" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        /* 搜索容器 */
        .search-container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            margin-bottom: 40px;
        }
        
        .logo {
            text-align: center;
            color: white;
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        /* 搜索引擎切换 */
        .engine-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .engine-tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .engine-tab:hover, .engine-tab.active {
            background: rgba(255,255,255,0.4);
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .search-box input {
            width: 100%;
            padding: 18px 60px 18px 25px;
            border: none;
            font-size: 16px;
            outline: none;
        }
        
        .search-box button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .search-box button:hover {
            background: #764ba2;
            transform: translateY(-50%) scale(1.1);
        }
        
        /* 快捷链接 */
        .quick-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
        }
        
        .link-group {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        .link-group h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .link-group a {
            display: block;
            color: #555;
            text-decoration: none;
            padding: 6px 0;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .link-group a:hover {
            color: #667eea;
            padding-left: 5px;
        }
        
        /* 大盘走势 */
        .stocks {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            margin-bottom: 30px;
        }
        
        .stock-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        .stock-name {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .stock-price {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .stock-change {
            font-size: 12px;
        }
        
        .up { color: #e53935; }
        .down { color: #43a047; }
        
        /* 底部 */
        .footer {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .logo { font-size: 32px; }
            .quick-links, .stocks { grid-template-columns: repeat(2, 1fr); }
            .engine-tabs { flex-wrap: wrap; }
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Logo -->
    <div class="logo">🌹 万里千寻</div>
    
    <!-- 搜索区域 -->
    <div class="search-container">
        <!-- 搜索引擎切换 -->
        <div class="engine-tabs">
            <button class="engine-tab active" onclick="setEngine('baidu')">百度</button>
            <button class="engine-tab" onclick="setEngine('google')">谷歌</button>
            <button class="engine-tab" onclick="setEngine('bing')">必应</button>
            <button class="engine-tab" onclick="setEngine('sogou')">搜狗</button>
        </div>
        
        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入搜索内容..." onkeypress="if(event.key==='Enter')doSearch()">
            <button onclick="doSearch()">🔍</button>
        </div>
    </div>
    
    <!-- 大盘走势 -->
    <div class="stocks">
        <div class="stock-card">
            <div class="stock-name">🇨🇳 上证指数</div>
            <div class="stock-price" id="sh000001">---</div>
            <div class="stock-change" id="sh000001-change"><span class="loading"></span></div>
        </div>
        <div class="stock-card">
            <div class="stock-name">🇨🇳 深证成指</div>
            <div class="stock-price" id="sz399001">---</div>
            <div class="stock-change" id="sz399001-change"><span class="loading"></span></div>
        </div>
        <div class="stock-card">
            <div class="stock-name">🇨🇳 创业板指</div>
            <div class="stock-price" id="sz399006">---</div>
            <div class="stock-change" id="sz399006-change"><span class="loading"></span></div>
        </div>
        <div class="stock-card">
            <div class="stock-name">🇨🇳 科创 50</div>
            <div class="stock-price" id="sh000688">---</div>
            <div class="stock-change" id="sh000688-change"><span class="loading"></span></div>
        </div>
    </div>
    
    <!-- 快捷链接 -->
    <div class="quick-links">
        <div class="link-group">
            <h3>💰 财经</h3>
            <a href="https://quote.eastmoney.com/" target="_blank">东方财富</a>
            <a href="https://stockapp.com.cn/" target="_blank">同花顺</a>
            <a href="https://www.cls.cn/" target="_blank">财联社</a>
            <a href="https://xueqiu.com/" target="_blank">雪球</a>
        </div>
        <div class="link-group">
            <h3>📰 新闻</h3>
            <a href="https://www.thepaper.cn/" target="_blank">澎湃新闻</a>
            <a href="https://www.163.com/" target="_blank">网易</a>
            <a href="https://news.sina.com.cn/" target="_blank">新浪</a>
            <a href="https://www.chinanews.com.cn/" target="_blank">中新网</a>
        </div>
        <div class="link-group">
            <h3>🎬 视频</h3>
            <a href="https://www.bilibili.com/" target="_blank">哔哩哔哩</a>
            <a href="https://www.iqiyi.com/" target="_blank">爱奇艺</a>
            <a href="https://v.qq.com/" target="_blank">腾讯视频</a>
            <a href="https://www.youku.com/" target="_blank">优酷</a>
        </div>
        <div class="link-group">
            <h3>🛠️ 工具</h3>
            <a href="https://fanyi.baidu.com/" target="_blank">翻译</a>
            <a href="https://cli.im/" target="_blank">二维码</a>
            <a href="https://tool.lu/" target="_blank">在线工具</a>
            <a href="https://github.com/" target="_blank">GitHub</a>
        </div>
    </div>
    
    <!-- 底部 -->
    <div class="footer">
        <p>🌹 万里千寻 - 龙哥的起始页 | 2026</p>
    </div>
    
    <script>
        // 搜索引擎配置
        const engines = {
            baidu: 'https://www.baidu.com/s?wd=',
            google: 'https://www.google.com/search?q=',
            bing: 'https://www.bing.com/search?q=',
            sogou: 'https://www.sogou.com/web?query='
        };
        
        let currentEngine = 'baidu';
        
        // 切换搜索引擎
        function setEngine(engine) {
            currentEngine = engine;
            document.querySelectorAll('.engine-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            const placeholders = {
                baidu: '百度一下，你就知道',
                google: 'Search the world',
                bing: '搜索必应',
                sogou: '搜狗搜索'
            };
            document.getElementById('searchInput').placeholder = placeholders[engine];
        }
        
        // 搜索
        function doSearch() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                window.open(engines[currentEngine] + encodeURIComponent(query), '_blank');
            }
        }
        
        // 股票数据
        async function fetchStock(code, pid, cid) {
            try {
                const res = await fetch('https://hq.sinajs.cn/list=' + code);
                const text = await res.text();
                const el = eval(text);
                const v = el.split(',');
                const cur = parseFloat(v[3]), open = parseFloat(v[2]);
                const change = cur - open, pct = ((change/open)*100).toFixed(2);
                document.getElementById(pid).textContent = cur.toFixed(2);
                const cls = change>=0?'up':'down', sign = change>=0?'+':'';
                document.getElementById(cid).innerHTML = '<span class="'+cls+'">'+sign+change.toFixed(2)+'</span><span class="'+cls+'">('+sign+pct+'%)</span>';
            } catch(e) {}
        }
        
        function loadStocks() {
            fetchStock('sh000001','sh000001','sh000001-change');
            fetchStock('sz399001','sz399001','sz399001-change');
            fetchStock('sz399006','sz399006','sz399006-change');
            fetchStock('sh000688','sh000688','sh000688-change');
        }
        
        loadStocks();
        setInterval(loadStocks, 30000);
    </script>
</body>
</html>
