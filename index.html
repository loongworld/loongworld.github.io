<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万里千寻 - 龙哥的个人导航</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* ===== 基础样式 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif; }
        
        /* ===== 主题变量 ===== */
        :root {
            --primary-color: #2e7d32;
            --primary-dark: #1b5e20;
            --primary-light: #4caf50;
            --bg-color: #f1f8e9;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #2e7d32;
            --shadow: 0 4px 20px rgba(46, 125, 50, 0.15);
        }
        
        [data-theme="dark"] {
            --primary-color: #81c784;
            --primary-dark: #4caf50;
            --primary-light: #a5d6a7;
            --bg-color: #1a1a2e;
            --card-bg: rgba(30, 30, 50, 0.95);
            --text-color: #81c784;
            --shadow: 0 4px 20px rgba(129, 199, 132, 0.2);
        }
        
        body {
            background: var(--bg-color);
            background-image: 
                linear-gradient(rgba(76, 175, 80, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(76, 175, 80, 0.1) 1px, transparent 1px),
                linear-gradient(135deg, var(--bg-color) 0%, rgba(76, 175, 80, 0.05) 100%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            transition: all 0.3s ease;
        }
        
        /* ===== 顶部导航 ===== */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            z-index: 1000;
        }
        
        .nav-left {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            max-width: 60%;
        }
        
        .nav-left::-webkit-scrollbar { display: none; }
        
        .nav-left a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 14px;
            white-space: nowrap;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-left a:hover {
            background: var(--primary-light);
            color: white;
            transform: translateY(-2px);
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .weather-box {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-color);
            font-size: 13px;
        }
        
        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            background: var(--primary-light);
            color: white;
            border: none;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .theme-toggle:hover { transform: rotate(30deg); }
        
        /* ===== 主内容区 ===== */
        .main-content {
            min-height: 100vh;
            padding: 100px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        
        /* ===== 时间显示 ===== */
        .time-display {
            text-align: center;
            color: var(--text-color);
        }
        
        .time-display h1 {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 4px;
        }
        
        .time-display p {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 8px;
        }
        
        /* ===== 大盘走势卡片 ===== */
        .stock-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
        }
        
        .stock-title {
            color: var(--text-color);
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stock-title::before {
            content: '📈';
        }
        
        .stock-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .stock-card {
            background: linear-gradient(135deg, var(--bg-color) 0%, rgba(76, 175, 80, 0.1) 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stock-card:hover { transform: translateY(-5px); }
        
        .stock-name {
            font-size: 14px;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 10px;
        }
        
        .stock-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-color);
        }
        
        .stock-change {
            font-size: 14px;
            margin-top: 8px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .up { color: #e53935; }
        .down { color: #43a047; }
        
        /* ===== 快捷链接区 ===== */
        .quick-links {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .link-group {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .link-group h3 {
            color: var(--text-color);
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .link-group a {
            display: block;
            color: var(--text-color);
            text-decoration: none;
            padding: 10px 12px;
            margin: 5px 0;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .link-group a:hover {
            background: var(--primary-light);
            color: white;
            padding-left: 18px;
        }
        
        /* ===== 搜索框 ===== */
        .search-box {
            width: 100%;
            max-width: 600px;
            display: flex;
            background: var(--card-bg);
            border-radius: 50px;
            padding: 8px;
            box-shadow: var(--shadow);
        }
        
        .search-box input {
            flex: 1;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            background: transparent;
            color: var(--text-color);
            outline: none;
        }
        
        .search-box button {
            background: var(--primary-light);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-box button:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }
        
        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-color);
            font-size: 13px;
            opacity: 0.7;
        }
        
        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            .time-display h1 { font-size: 32px; }
            .stock-cards { grid-template-columns: 1fr; }
            .nav-left { max-width: 50%; }
            .top-nav { padding: 12px 15px; }
        }
        
        /* ===== 加载动画 ===== */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(46, 125, 50, 0.3);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="#home">🏠 首页</a>
            <a href="#finance">💰 财经</a>
            <a href="#news">📰 新闻</a>
            <a href="#tools">🛠️ 工具</a>
            <a href="/AAD/">📚 AAD</a>
            <a href="/DH/">🧭 导航</a>
        </div>
        <div class="nav-right">
            <div class="weather-box" id="weather">
                <span class="loading"></span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 时间显示 -->
        <div class="time-display">
            <h1 id="clock">00:00:00</h1>
            <p id="date">加载中...</p>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索 anything..." onkeypress="if(event.key==='Enter') doSearch()">
            <button onclick="doSearch()">🔍 搜索</button>
        </div>

        <!-- 大盘走势 -->
        <div class="stock-container" id="finance">
            <h2 class="stock-title">大盘走势</h2>
            <div class="stock-cards" id="stockCards">
                <div class="stock-card">
                    <div class="stock-name">🇨🇳 上证指数</div>
                    <div class="stock-value" id="sh000001">---</div>
                    <div class="stock-change" id="sh000001-change"><span class="loading"></span></div>
                </div>
                <div class="stock-card">
                    <div class="stock-name">🇨🇳 深证成指</div>
                    <div class="stock-value" id="sz399001">---</div>
                    <div class="stock-change" id="sz399001-change"><span class="loading"></span></div>
                </div>
                <div class="stock-card">
                    <div class="stock-name">🇨🇳 创业板指</div>
                    <div class="stock-value" id="sz399006">---</div>
                    <div class="stock-change" id="sz399006-change"><span class="loading"></span></div>
                </div>
                <div class="stock-card">
                    <div class="stock-name">🇨🇳 科创 50</div>
                    <div class="stock-value" id="sh000688">---</div>
                    <div class="stock-change" id="sh000688-change"><span class="loading"></span></div>
                </div>
            </div>
        </div>

        <!-- 快捷链接 -->
        <div class="quick-links" id="tools">
            <!-- 财经 -->
            <div class="link-group" id="finance">
                <h3>💰 财经</h3>
                <a href="https://quote.eastmoney.com/" target="_blank">东方财富网</a>
                <a href="https://stockapp.com.cn/" target="_blank">同花顺财经</a>
                <a href="https://www.cls.cn/" target="_blank">财联社</a>
                <a href="https://xueqiu.com/" target="_blank">雪球</a>
            </div>
            
            <!-- 新闻 -->
            <div class="link-group" id="news">
                <h3>📰 新闻</h3>
                <a href="https://www.thepaper.cn/" target="_blank">澎湃新闻</a>
                <a href="https://www.163.com/" target="_blank">网易新闻</a>
                <a href="https://news.sina.com.cn/" target="_blank">新浪新闻</a>
                <a href="https://www.chinanews.com.cn/" target="_blank">中国新闻网</a>
            </div>
            
            <!-- 视频 -->
            <div class="link-group">
                <h3>🎬 视频</h3>
                <a href="https://www.bilibili.com/" target="_blank">哔哩哔哩</a>
                <a href="https://www.iqiyi.com/" target="_blank">爱奇艺</a>
                <a href="https://v.qq.com/" target="_blank">腾讯视频</a>
                <a href="https://www.youku.com/" target="_blank">优酷</a>
            </div>
            
            <!-- 工具 -->
            <div class="link-group">
                <h3>🛠️ 工具</h3>
                <a href="https://fanyi.baidu.com/" target="_blank">百度翻译</a>
                <a href="https://cli.im/" target="_blank">草料二维码</a>
                <a href="https://tool.lu/" target="_blank">在线工具</a>
                <a href="https://github.com/" target="_blank">GitHub</a>
            </div>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <p>🌹 万里千寻 - 龙哥的个人导航 | 更新于 2026</p>
    </footer>

    <script>
        // ===== 时钟 =====
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ===== 搜索 =====
        function doSearch() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                window.open(`https://www.baidu.com/s?wd=${encodeURIComponent(query)}`, '_blank');
            }
        }

        // ===== 主题切换 =====
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                btn.textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
            }
        }

        // ===== 天气 =====
        async function fetchWeather() {
            try {
                const response = await fetch('https://api.seniverse.com/v3/weather/now.json?key=YOUR_API_KEY&location=beijing&language=zh-Hans&unit=c');
                const data = await response.json();
                if (data.results) {
                    const weather = data.results[0].now;
                    document.getElementById('weather').innerHTML = `
                        <span>${weather.text}</span>
                        <span>${weather.temperature}°C</span>
                    `;
                }
            } catch (e) {
                document.getElementById('weather').innerHTML = '<span>🌤️ 北京</span>';
            }
        }
        fetchWeather();

        // ===== 股票数据 =====
        async function fetchStock(code, elementId, changeId) {
            try {
                const response = await fetch(`https://hq.sinajs.cn/list=${code}`);
                const text = await response.text();
                const data = eval(text);
                const elements = data.split(',');
                
                const current = parseFloat(elements[3]);
                const open = parseFloat(elements[2]);
                const change = current - open;
                const changePercent = ((change / open) * 100).toFixed(2);
                
                document.getElementById(elementId).textContent = current.toFixed(2);
                
                const changeClass = change >= 0 ? 'up' : 'down';
                const changeSign = change >= 0 ? '+' : '';
                document.getElementById(changeId).innerHTML = `
                    <span class="${changeClass}">${changeSign}${change.toFixed(2)}</span>
                    <span class="${changeClass}">(${changeSign}${changePercent}%)</span>
                `;
            } catch (e) {
                console.error('Stock fetch error:', e);
            }
        }

        // 加载股票数据
        function loadStocks() {
            fetchStock('sh000001', 'sh000001', 'sh000001-change');
            fetchStock('sz399001', 'sz399001', 'sz399001-change');
            fetchStock('sz399006', 'sz399006', 'sz399006-change');
            fetchStock('sh000688', 'sh000688', 'sh000688-change');
        }
        
        loadStocks();
        // 交易时间每 30 秒刷新
        setInterval(loadStocks, 30000);
    </script>
</body>
</html>
