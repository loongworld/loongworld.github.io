<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万里千寻 - 龙哥的起始页</title>
    <link rel="icon" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }
        
        /* 天气信息 - 左上角 */
        .weather-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 200px;
        }
        
        .weather-location {
            font-size: 12px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .weather-detail {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .weather-icon { font-size: 18px; }
        .weather-temp { font-weight: 600; }
        .weather-desc { font-size: 12px; opacity: 0.8; }
        
        /* 跳舞美女 - 右下角 */
        .dancing-girl {
            position: fixed;
            bottom: 0;
            right: 80px;
            width: 180px;
            height: 320px;
            pointer-events: none;
            z-index: 100;
        }
        
        .dancing-girl img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: dance 2s ease-in-out infinite;
        }
        
        @keyframes dance {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(2deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-10px) rotate(-2deg); }
        }
        
        /* 时间日期 */
        .datetime {
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .datetime:hover {
            transform: scale(1.05);
        }
        
        .datetime.active {
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        .time {
            font-size: 72px;
            font-weight: 200;
            letter-spacing: 4px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .date {
            font-size: 18px;
            opacity: 0.9;
            margin-top: 10px;
            letter-spacing: 2px;
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            background: white;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            padding: 6px;
            margin: 0 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 16px 60px 16px 25px;
            border: none;
            font-size: 16px;
            outline: none;
            border-radius: 50px;
        }
        
        .search-box button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .search-box button:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        
        /* 搜索引擎切换 */
        .engine-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .engine-tab {
            padding: 6px 14px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .engine-tab:hover, .engine-tab.active {
            background: rgba(255,255,255,0.4);
        }
        
        /* 底部 */
        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
        
        @media (max-width: 768px) {
            .time { font-size: 48px; }
            .date { font-size: 14px; }
            .weather-info { top: 10px; left: 10px; padding: 8px 12px; }
            .dancing-girl { width: 120px; height: 220px; right: 20px; }
            .search-box { max-width: 90%; }
        }
    </style>
</head>
<body>
    <!-- 天气信息 - 左上角 -->
    <div class="weather-info" id="weatherInfo">
        <div class="weather-location">📍 加载中...</div>
        <div class="weather-detail">
            <span class="weather-icon">🌤️</span>
            <span class="weather-temp">--°C</span>
        </div>
        <div class="weather-desc">--</div>
    </div>
    
    <!-- 跳舞美女 - 右下角 -->
    <div class="dancing-girl">
        <img src="https://api.dicebear.com/9.x/notionists/svg?seed=girl&backgroundColor=ffdfbf" alt="Dancing Girl" id="dancingGirl">
    </div>
    
    <!-- 时间日期 - 可点击跳转到综合导航 -->
    <div class="datetime" id="datetime" onclick="toggleTimeStyle(); window.open('https://quote.eastmoney.com/central/', '_blank')" title="点击打开综合导航">
        <div class="time" id="time">00:00:00</div>
        <div class="date" id="date">加载中...</div>
    </div>
    
    <!-- 搜索框 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="百度一下，你就知道" onkeypress="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">🔍</button>
    </div>
    
    <!-- 搜索引擎切换 -->
    <div class="engine-tabs">
        <button class="engine-tab active" onclick="setEngine('baidu', this)">百度</button>
        <button class="engine-tab" onclick="setEngine('google', this)">谷歌</button>
        <button class="engine-tab" onclick="setEngine('bing', this)">必应</button>
        <button class="engine-tab" onclick="setEngine('sogou', this)">搜狗</button>
    </div>
    
    <!-- 底部 -->
    <div class="footer">
        🌹 万里千寻 - 龙哥的起始页
    </div>
    
    <script>
        // 时间
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = 
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0') + ':' +
                String(now.getSeconds()).padStart(2,'0');
            
            const options = { year:'numeric', month:'long', day:'numeric', weekday:'long' };
            document.getElementById('date').textContent = 
                now.toLocaleDateString('zh-CN', options);
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // 点击时间变粗
        function toggleTimeStyle() {
            document.getElementById('datetime').classList.add('active');
            setTimeout(() => {
                document.getElementById('datetime').classList.remove('active');
            }, 300);
        }
        
        // 搜索
        const engines = {
            baidu: {url: 'https://www.baidu.com/s?wd=', placeholder: '百度一下，你就知道'},
            google: {url: 'https://www.google.com/search?q=', placeholder: 'Search the world'},
            bing: {url: 'https://www.bing.com/search?q=', placeholder: '搜索必应'},
            sogou: {url: 'https://www.sogou.com/web?query=', placeholder: '搜狗搜索'}
        };
        
        let currentEngine = 'baidu';
        
        function setEngine(engine, btn) {
            currentEngine = engine;
            document.querySelectorAll('.engine-tab').forEach(t => t.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.getElementById('searchInput').placeholder = engines[engine].placeholder;
        }
        
        function doSearch() {
            const q = document.getElementById('searchInput').value;
            if(q) window.open(engines[currentEngine].url + encodeURIComponent(q), '_blank');
        }
        
        // 天气 + IP 地理位置
        async function fetchWeatherAndLocation() {
            try {
                // 获取 IP 和位置
                const ipRes = await fetch('https://api.ipapi.com/api/check?access_key=demo');
                const ipData = await ipRes.json();
                
                // 使用免费 API 获取位置
                const locationRes = await fetch('https://ipapi.co/json/');
                const locationData = await locationRes.json();
                
                const city = locationData.city || '北京';
                const region = locationData.region || '北京';
                const country = locationData.country_name || '中国';
                
                // 获取天气
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${locationData.latitude||39.9}&longitude=${locationData.longitude||116.4}&current_weather=true`);
                const weatherData = await weatherRes.json();
                
                if(weatherData.current_weather) {
                    const w = weatherData.current_weather;
                    const icons = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
                    const icon = icons[w.weathercode] || '🌤️';
                    
                    document.getElementById('weatherInfo').innerHTML = `
                        <div class="weather-location">📍 ${city}, ${region}</div>
                        <div class="weather-detail">
                            <span class="weather-icon">${icon}</span>
                            <span class="weather-temp">${w.temperature}°C</span>
                        </div>
                        <div class="weather-desc">风速 ${w.windspeed}km/h</div>
                    `;
                }
            } catch(e) {
                // 默认显示北京
                document.getElementById('weatherInfo').innerHTML = `
                    <div class="weather-location">📍 北京</div>
                    <div class="weather-detail">
                        <span class="weather-icon">🌤️</span>
                        <span class="weather-temp">--°C</span>
                    </div>
                    <div class="weather-desc">获取中...</div>
                `;
            }
        }
        fetchWeatherAndLocation();
        
        // 自动刷新天气（每小时）
        setInterval(fetchWeatherAndLocation, 3600000);
    </script>
</body>
</html>
