<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万里千寻 - 龙哥的起始页</title>
    <link rel="icon" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }
        
        /* 天气信息 - 左上角 */
        .weather-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            min-width: 180px;
        }
        
        .weather-location {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .weather-detail {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .weather-icon { 
            font-size: 24px; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .weather-temp { 
            font-weight: 700; 
            font-size: 20px;
        }
        .weather-more {
            font-size: 12px;
            opacity: 0.85;
            display: flex;
            gap: 10px;
        }
        
        /* 真人跳舞美女 - 右下角 */
        .dancing-girl {
            position: fixed;
            bottom: 20px;
            right: 30px;
            width: 200px;
            height: 280px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.2);
        }
        
        .dancing-girl video,
        .dancing-girl img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .girl-label {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            white-space: nowrap;
        }
        
        /* 时间日期 */
        .datetime-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .datetime {
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding: 20px 40px;
            border-radius: 20px;
        }
        
        .datetime:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }
        
        .datetime:active,
        .datetime.clicked {
            transform: scale(0.98);
        }
        
        .datetime.clicked .time {
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 60px rgba(255,255,255,0.6);
            letter-spacing: 6px;
        }
        
        .time {
            font-size: 78px;
            font-weight: 200;
            letter-spacing: 4px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            line-height: 1;
        }
        
        .date {
            font-size: 18px;
            opacity: 0.95;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 400;
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            background: white;
            border-radius: 50px;
            box-shadow: 0 12px 50px rgba(0,0,0,0.35);
            width: 100%;
            max-width: 580px;
            padding: 8px;
            margin: 0 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 18px 70px 18px 28px;
            border: none;
            font-size: 16px;
            outline: none;
            border-radius: 50px;
            background: #fafafa;
        }
        
        .search-box input:focus {
            background: white;
        }
        
        .search-box button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        
        .search-box button:hover {
            transform: translateY(-50%) scale(1.12) rotate(-10deg);
            box-shadow: 0 6px 20px rgba(102,126,234,0.6);
        }
        
        /* 搜索引擎切换 */
        .engine-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .engine-tab {
            padding: 8px 18px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .engine-tab:hover {
            background: rgba(255,255,255,0.35);
            transform: translateY(-2px);
        }
        
        .engine-tab.active {
            background: rgba(255,255,255,0.4);
            border-color: white;
            box-shadow: 0 4px 15px rgba(255,255,255,0.3);
        }
        
        /* 底部 */
        .footer {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.6;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .time { font-size: 52px; }
            .date { font-size: 14px; }
            .weather-info { top: 10px; left: 10px; padding: 10px 14px; min-width: 140px; }
            .dancing-girl { width: 140px; height: 200px; right: 10px; bottom: 10px; }
            .search-box { max-width: 90%; padding: 6px; }
            .search-box input { padding: 14px 50px 14px 20px; font-size: 15px; }
            .search-box button { width: 40px; height: 40px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- 天气信息 - 左上角 -->
    <div class="weather-info" id="weatherInfo">
        <div class="weather-location">📍 获取位置中...</div>
        <div class="weather-detail">
            <span class="weather-icon">🌡️</span>
            <span class="weather-temp">--°C</span>
        </div>
        <div class="weather-more">
            <span id="weatherDesc">--</span>
            <span id="weatherWind">💨 --km/h</span>
        </div>
    </div>
    
    <!-- 真人跳舞美女 - 右下角 -->
    <div class="dancing-girl">
        <!-- 使用真实的跳舞 GIF -->
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXNxeWNxeG8xeG8xeG8xeG8xeG8xeG8xeG8xeG8xeCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/13Coqzp7sxaZx6/giphy.gif" alt="Dancing Girl" id="dancingGirl">
        <div class="girl-label">💃 休息一下~</div>
    </div>
    
    <!-- 时间日期 -->
    <div class="datetime-container">
        <div class="datetime" id="datetime" onclick="handleTimeClick()" title="点击打开综合导航">
            <div class="time" id="time">00:00:00</div>
            <div class="date" id="date">加载中...</div>
        </div>
    </div>
    
    <!-- 搜索框 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="百度一下，你就知道" onkeypress="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">🔍</button>
    </div>
    
    <!-- 搜索引擎切换 -->
    <div class="engine-tabs">
        <button class="engine-tab active" onclick="setEngine('baidu', this)">百度</button>
        <button class="engine-tab" onclick="setEngine('google', this)">谷歌</button>
        <button class="engine-tab" onclick="setEngine('bing', this)">必应</button>
        <button class="engine-tab" onclick="setEngine('sogou', this)">搜狗</button>
    </div>
    
    <!-- 底部 -->
    <div class="footer">
        🌹 万里千寻 - 龙哥的起始页 · 2026
    </div>
    
    <script>
        // ===== 时间功能 =====
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = 
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0') + ':' +
                String(now.getSeconds()).padStart(2,'0');
            
            const options = { year:'numeric', month:'long', day:'numeric', weekday:'long' };
            document.getElementById('date').textContent = 
                now.toLocaleDateString('zh-CN', options);
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // 点击时间跳转
        function handleTimeClick() {
            const dt = document.getElementById('datetime');
            dt.classList.add('clicked');
            
            // 0.5 秒后打开链接
            setTimeout(() => {
                window.open('https://quote.eastmoney.com/central/', '_blank');
            }, 300);
            
            // 1.5 秒后恢复
            setTimeout(() => {
                dt.classList.remove('clicked');
            }, 1500);
        }
        
        // ===== 搜索功能 =====
        const engines = {
            baidu: {url: 'https://www.baidu.com/s?wd=', placeholder: '百度一下，你就知道'},
            google: {url: 'https://www.google.com/search?q=', placeholder: 'Search the world'},
            bing: {url: 'https://www.bing.com/search?q=', placeholder: '搜索必应'},
            sogou: {url: 'https://www.sogou.com/web?query=', placeholder: '搜狗搜索'}
        };
        
        let currentEngine = 'baidu';
        
        function setEngine(engine, btn) {
            currentEngine = engine;
            document.querySelectorAll('.engine-tab').forEach(t => t.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.getElementById('searchInput').placeholder = engines[engine].placeholder;
        }
        
        function doSearch() {
            const q = document.getElementById('searchInput').value;
            if(q) window.open(engines[currentEngine].url + encodeURIComponent(q), '_blank');
        }
        
        // ===== 天气 + 地理位置 =====
        async function fetchWeatherAndLocation() {
            try {
                // 第一步：获取 IP 位置信息
                const ipRes = await fetch('https://ipapi.co/json/');
                if(!ipRes.ok) throw new Error('IP API failed');
                const ipData = await ipRes.json();
                
                const city = ipData.city || '北京';
                const region = ipData.region || '北京';
                const lat = ipData.latitude || 39.9042;
                const lon = ipData.longitude || 116.4074;
                
                // 第二步：获取天气
                const weatherRes = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&windspeed_unit=kmh`
                );
                if(!weatherRes.ok) throw new Error('Weather API failed');
                const weatherData = await weatherRes.json();
                
                if(weatherData.current_weather) {
                    const w = weatherData.current_weather;
                    const icons = {
                        0: ['☀️', '晴朗'], 1: ['🌤️', '多云'], 2: ['⛅', '少云'], 3: ['☁️', '阴天'],
                        45: ['🌫️', '雾'], 48: ['🌫️', '雾凇'],
                        51: ['🌦️', '毛毛雨'], 53: ['🌦️', '中雨'], 55: ['🌦️', '大雨'],
                        61: ['🌧️', '小雨'], 63: ['🌧️', '中雨'], 65: ['🌧️', '大雨'],
                        71: ['🌨️', '小雪'], 73: ['🌨️', '中雪'], 75: ['🌨️', '大雪'],
                        80: ['🌦️', '阵雨'], 81: ['🌧️', '中雨'], 82: ['⛈️', '暴雨'],
                        95: ['⛈️', '雷雨'], 96: ['⛈️', '雷阵雨'], 99: ['⛈️', '大暴雨']
                    };
                    const [icon, desc] = icons[w.weathercode] || ['🌤️', '多云'];
                    
                    document.getElementById('weatherInfo').innerHTML = `
                        <div class="weather-location">📍 ${city}, ${region}</div>
                        <div class="weather-detail">
                            <span class="weather-icon">${icon}</span>
                            <span class="weather-temp">${w.temperature}°C</span>
                        </div>
                        <div class="weather-more">
                            <span>${desc}</span>
                            <span>💨 ${w.windspeed}km/h</span>
                        </div>
                    `;
                }
            } catch(e) {
                // 默认显示北京天气
                document.getElementById('weatherInfo').innerHTML = `
                    <div class="weather-location">📍 北京市</div>
                    <div class="weather-detail">
                        <span class="weather-icon">🌤️</span>
                        <span class="weather-temp">--°C</span>
                    </div>
                    <div class="weather-more">
                        <span>获取中...</span>
                        <span>💨 --km/h</span>
                    </div>
                `;
                console.log('天气获取失败:', e);
            }
        }
        
        // 立即获取
        fetchWeatherAndLocation();
        
        // 每小时刷新
        setInterval(fetchWeatherAndLocation, 3600000);
    </script>
</body>
</html>
