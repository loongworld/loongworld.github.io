<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万里千寻 - 龙哥的起始页</title>
    <link rel="icon" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 20px;
        }
        
        /* 动态背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(102, 126, 234, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(118, 75, 162, 0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
            animation: bgShift 20s ease-in-out infinite;
        }
        
        @keyframes bgShift {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        
        /* 天气信息 */
        .weather-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 100;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .weather-info:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.18);
        }
        
        .weather-location {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.95;
        }
        
        .weather-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .weather-icon { font-size: 22px; }
        .weather-temp { font-weight: 700; font-size: 20px; }
        .weather-extra { font-size: 11px; opacity: 0.8; }
        
        .weather-loading, .weather-default { opacity: 0.7; font-size: 12px; }
        
        .weather-loading { opacity: 0.6; font-size: 12px; }
        
        /* 时间日期 */
        .datetime-container {
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
            padding: 20px 30px;
            border-radius: 20px;
            transition: background 0.3s;
        }
        
        .datetime-container:hover {
            background: rgba(255,255,255,0.06);
        }
        
        .time {
            font-size: 96px;
            font-weight: 600;
            letter-spacing: 8px;
            text-shadow: 0 8px 30px rgba(0,0,0,0.3);
            line-height: 1;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
        }
        
        .date {
            font-size: 15px;
            opacity: 0.88;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 400;
        }
        
        .date-lunar {
            margin-left: 12px;
            opacity: 0.75;
            font-size: 14px;
        }
        
        /* 引擎切换 */
        .search-engine {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        
        .engine-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .engine-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        
        .engine-btn.active {
            background: rgba(255,255,255,0.3);
            font-weight: 600;
        }
        
        /* 搜索框 - 居中 */
        .search-box {
            position: relative;
            background: rgba(255,255,255,0.98);
            border-radius: 50px;
            box-shadow: 0 15px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 580px;
            padding: 8px;
            display: flex;
            align-items: center;
            margin-top: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 16px 20px;
            padding-right: 60px;
            border: none;
            font-size: 17px;
            outline: none;
            background: transparent;
            color: #333;
            font-weight: 400;
        }
        
        .search-box input::placeholder {
            color: #999;
        }
        
        .search-box .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            transition: all 0.3s;
        }
        
        .search-box .search-btn:hover {
            background: rgba(0,0,0,0.05);
        }
        
        .search-box .search-btn svg {
            width: 20px;
            height: 20px;
            fill: #666;
        }
        
        /* 快捷导航 */
        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .quick-nav a {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 13px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        
        .quick-nav a:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }
        
        /* 底部 */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            opacity: 0.6;
        }
        
        /* 手机端优化 */
        @media (max-width: 768px) {
            .time { font-size: 64px; }
            .date { font-size: 13px; }
            .search-box { max-width: 90%; }
            .quick-nav { gap: 8px; }
            .quick-nav a { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- 天气信息 -->
    <div class="weather-info" onclick="openWeather()">
        <div class="weather-location">
            <span class="weather-icon">🌤️</span>
            <span>加载中...</span>
        </div>
        <div class="weather-main">
            <span class="weather-temp">--°</span>
            <span class="weather-extra">--</span>
        </div>
        <div class="weather-loading">正在获取天气数据...</div>
    </div>
    
    <!-- 引擎切换 -->
    <div class="search-engine">
        <button class="engine-btn active" onclick="setEngine('baidu')">百度</button>
        <button class="engine-btn" onclick="setEngine('bing')">Bing</button>
        <button class="engine-btn" onclick="setEngine('google')">Google</button>
    </div>
    
    <!-- 时间日期 -->
    <div class="datetime-container" onclick="copyTime()">
        <div class="time" id="time">00:00</div>
        <div class="date">
            <span id="date">--年--月--日</span>
            <span class="date-lunar" id="lunar">--</span>
        </div>
    </div>
    
    <!-- 搜索框 -->
    <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索..." onkeypress="handleKeyPress(event)">
        <button class="search-btn" onclick="search()">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
    </div>
    
    <!-- 快捷导航 -->
    <div class="quick-nav">
        <a href="https://book.douban.com/" target="_blank">📚 微信读书</a>
        <a href="https://www.zcool.com.cn/" target="_blank">🎨 站酷</a>
        <a href="https://www.yuque.com/" target="_blank">📝 语雀</a>
        <a href="https://sspai.com/" target="_blank">💡 少数派</a>
        <a href="https://cli.im/" target="_blank">🛠️ 草料二维码</a>
    </div>
    
    <!-- 底部 -->
    <div class="footer">🌹 万里千寻 · 龙哥的起始页</div>
    
    <script>
        // 当前引擎
        let currentEngine = 'baidu';
        const engines = {
            baidu: { url: 'https://www.baidu.com/s?wd=', name: '百度' },
            bing: { url: 'https://www.bing.com/search?q=', name: 'Bing' },
            google: { url: 'https://www.google.com/search?q=', name: 'Google' }
        };
        
        // 引擎切换
        function setEngine(engine) {
            currentEngine = engine;
            document.querySelectorAll('.engine-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        // 搜索
        function search() {
            const query = document.getElementById('search-input').value.trim();
            if (query) {
                window.open(engines[currentEngine].url + encodeURIComponent(query), '_blank');
            }
        }
        
        // 回车搜索
        function handleKeyPress(e) {
            if (e.key === 'Enter') search();
        }
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}`;
            
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            document.getElementById('date').textContent = `${year}年${month}月${day}日`;
            
            // 简单农历（这里用占位，实际可调用 API）
            document.getElementById('lunar').textContent = '农历查询中...';
        }
        
        // 复制时间
        function copyTime() {
            const time = document.getElementById('time').textContent;
            navigator.clipboard.writeText(time);
            alert(`已复制：${time}`);
        }
        
        // 打开天气
        function openWeather() {
            window.open('https://tianqi.2345.com/', '_blank');
        }
        
        // 初始化
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
