<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万里千寻 - 龙哥的起始页</title>
    <link rel="icon" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* 天气信息 - 左上角 */
        .weather-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 100;
        }
        
        .weather-location {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.95;
        }
        
        .weather-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .weather-icon { font-size: 22px; }
        .weather-temp { font-weight: 700; font-size: 20px; }
        .weather-extra { font-size: 11px; opacity: 0.8; }
        
        /* 时间日期 */
        .datetime-container {
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
            padding: 20px 30px;
            border-radius: 20px;
            transition: background 0.3s;
        }
        
        .datetime-container:hover {
            background: rgba(255,255,255,0.06);
        }
        
        .time {
            font-size: 96px;
            font-weight: 600;
            letter-spacing: 8px;
            text-shadow: 0 8px 30px rgba(0,0,0,0.3);
            line-height: 1;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
        }
        
        .date {
            font-size: 16px;
            opacity: 0.9;
            margin-top: 12px;
            letter-spacing: 3px;
            font-weight: 400;
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            background: rgba(255,255,255,0.98);
            border-radius: 50px;
            box-shadow: 0 15px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 580px;
            padding: 8px;
            margin: 0 20px;
            display: flex;
            align-items: center;
        }
        
        .search-box input {
            flex: 1;
            padding: 16px 20px;
            border: none;
            font-size: 17px;
            outline: none;
            background: transparent;
            color: #333;
            font-weight: 400;
        }
        
        .search-box input::placeholder {
            color: #999;
        }
        
        .search-box button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: white;
        }
        
        .search-box button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 22px rgba(102,126,234,0.5);
        }
        
        .search-box button:active {
            transform: scale(0.95);
        }
        
        /* 每日一言 - 简洁版 */
        .daily-quote {
            max-width: 600px;
            text-align: center;
            padding: 20px 25px;
            margin: 35px 20px 0;
        }
        
        .quote-text {
            font-size: 15px;
            line-height: 1.8;
            color: rgba(255,255,255,0.9);
            font-weight: 400;
            letter-spacing: 1px;
        }
        
        /* 底部 */
        .footer {
            position: fixed;
            bottom: 15px;
            font-size: 11px;
            opacity: 0.5;
            text-align: center;
            letter-spacing: 1px;
        }
        
        /* 手机端优化 */
        @media (max-width: 768px) {
            body {
                justify-content: flex-start;
                padding-top: 80px;
            }
            
            .weather-info {
                top: 10px;
                left: 10px;
                padding: 10px 14px;
                min-width: 130px;
            }
            
            .weather-temp { font-size: 17px; }
            .weather-icon { font-size: 19px; }
            
            .datetime-container {
                padding: 15px 20px;
                margin-bottom: 30px;
            }
            
            .time {
                font-size: 52px;
                letter-spacing: 4px;
                font-weight: 600;
            }
            
            .date {
                font-size: 13px;
                letter-spacing: 2px;
                margin-top: 10px;
            }
            
            .search-box {
                max-width: calc(100% - 30px);
                padding: 6px;
                margin: 0 15px;
            }
            
            .search-box input {
                padding: 14px 16px;
                font-size: 16px;
            }
            
            .search-box button {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            
            .daily-quote {
                padding: 15px 18px;
                margin: 25px 15px 0;
            }
            
            .quote-text {
                font-size: 14px;
                line-height: 1.7;
            }
            
            .footer {
                font-size: 10px;
                bottom: 10px;
            }
        }
        
        /* 小屏幕手机 */
        @media (max-width: 400px) {
            .time { font-size: 44px; letter-spacing: 2px; }
            .date { font-size: 12px; }
            .weather-info { font-size: 11px; }
            .weather-temp { font-size: 16px; }
        }
    </style>
</head>
<body>
    <!-- 天气信息 -->
    <div class="weather-info" id="weatherInfo">
        <div class="weather-location">📍 定位中...</div>
        <div class="weather-main">
            <span class="weather-icon">🌡️</span>
            <span class="weather-temp">--°C</span>
        </div>
        <div class="weather-extra" id="weatherExtra">💨 --km/h</div>
    </div>
    
    <!-- 时间日期 -->
    <div class="datetime-container" onclick="window.open('central/', '_blank')" title="点击打开综合导航">
        <div class="time" id="time">00:00:00</div>
        <div class="date" id="date">加载中...</div>
    </div>
    
    <!-- 搜索框 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="百度一下，你就知道" onkeypress="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()" title="百度搜索">搜索</button>
    </div>
    
    <!-- 每日一言 -->
    <div class="daily-quote">
        <p class="quote-text" id="quoteText">加载中...</p>
    </div>
    
    <!-- 底部 -->
    <div class="footer">
        🌹 万里千寻 · 龙哥的起始页
    </div>
    
    <script>
        // ===== 时间功能 =====
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = 
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0') + ':' +
                String(now.getSeconds()).padStart(2,'0');
            
            // 公历年月日
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            document.getElementById('date').textContent = 
                year + '年' + month + '月' + day + '日';
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // ===== 百度搜索 =====
        function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if(q) {
                window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(q), '_blank');
            }
        }
        
        // ===== 每日一言 =====
        async function fetchQuote() {
            try {
                const res = await fetch('https://v1.hitokoto.cn/?c=d&c=i&c=k&max_length=50');
                const data = await res.json();
                document.getElementById('quoteText').textContent = '"' + data.hitokoto + '"';
            } catch(e) {
                const quotes = [
                    '生活不止眼前的苟且，还有诗和远方。',
                    '人生没有彩排，每一天都是现场直播。',
                    '越努力，越幸运。',
                    '心若向阳，无惧悲伤。',
                    '简单生活，快乐自来。',
                    '不忘初心，方得始终。',
                    '未来可期，人间值得。'
                ];
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById('quoteText').textContent = '"' + q + '"';
            }
        }
        fetchQuote();
        
        // ===== 天气 + 地理位置 =====
        async function fetchWeatherAndLocation() {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                if(!ipRes.ok) throw new Error('IP API failed');
                const ipData = await ipRes.json();
                
                const city = ipData.city || '北京';
                const lat = ipData.latitude || 39.9042;
                const lon = ipData.longitude || 116.4074;
                
                const weatherRes = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&windspeed_unit=kmh`
                );
                if(!weatherRes.ok) throw new Error('Weather API failed');
                const weatherData = await weatherRes.json();
                
                if(weatherData.current_weather) {
                    const w = weatherData.current_weather;
                    const icons = {
                        0: ['☀️', '晴朗'], 1: ['🌤️', '多云'], 2: ['⛅', '少云'], 3: ['☁️', '阴天'],
                        45: ['🌫️', '雾'], 48: ['🌫️', '雾凇'],
                        51: ['🌦️', '小雨'], 53: ['🌦️', '中雨'], 55: ['🌦️', '大雨'],
                        61: ['🌧️', '小雨'], 63: ['🌧️', '中雨'], 65: ['🌧️', '大雨'],
                        71: ['🌨️', '小雪'], 73: ['🌨️', '中雪'], 75: ['🌨️', '大雪'],
                        80: ['🌦️', '阵雨'], 81: ['🌧️', '中雨'], 82: ['⛈️', '暴雨'],
                        95: ['⛈️', '雷雨'], 96: ['⛈️', '雷阵雨'], 99: ['⛈️', '大暴雨']
                    };
                    const [icon, desc] = icons[w.weathercode] || ['🌤️', '多云'];
                    
                    document.getElementById('weatherInfo').innerHTML = `
                        <div class="weather-location">📍 ${city}</div>
                        <div class="weather-main">
                            <span class="weather-icon">${icon}</span>
                            <span class="weather-temp">${w.temperature}°C</span>
                        </div>
                        <div class="weather-extra">${desc} 💨 ${w.windspeed}km/h</div>
                    `;
                    
                    document.getElementById('weatherExtra').textContent = desc + ' 💨 ' + w.windspeed + 'km/h';
                }
            } catch(e) {
                document.getElementById('weatherInfo').innerHTML = `
                    <div class="weather-location">📍 北京</div>
                    <div class="weather-main">
                        <span class="weather-icon">🌤️</span>
                        <span class="weather-temp">--°C</span>
                    </div>
                    <div class="weather-extra">获取中...</div>
                `;
            }
        }
        
        fetchWeatherAndLocation();
        setInterval(fetchWeatherAndLocation, 3600000);
    </script>
</body>
</html>
