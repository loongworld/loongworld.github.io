<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万里千寻 - 龙哥的起始页</title>
    <link rel="icon" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* 天气信息 - 左上角 */
        .weather-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 100;
        }
        
        .weather-location {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.95;
        }
        
        .weather-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .weather-icon { font-size: 22px; }
        .weather-temp { font-weight: 700; font-size: 20px; }
        .weather-extra { font-size: 11px; opacity: 0.8; }
        
        /* 时间日期 */
        .datetime-container {
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
            padding: 20px 30px;
            border-radius: 20px;
            transition: background 0.3s;
        }
        
        .datetime-container:hover {
            background: rgba(255,255,255,0.06);
        }
        
        .time {
            font-size: 96px;
            font-weight: 600;
            letter-spacing: 8px;
            text-shadow: 0 8px 30px rgba(0,0,0,0.3);
            line-height: 1;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
        }
        
        .date {
            font-size: 15px;
            opacity: 0.88;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 400;
        }
        
        .date-lunar {
            margin-left: 12px;
            opacity: 0.75;
            font-size: 14px;
        }
        
        /* 搜索框 */
        .search-box {
            position: relative;
            background: rgba(255,255,255,0.98);
            border-radius: 50px;
            box-shadow: 0 15px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 580px;
            padding: 8px;
            margin: 0 20px;
            display: flex;
            align-items: center;
        }
        
        .search-box input {
            flex: 1;
            padding: 16px 20px;
            padding-right: 60px;
            border: none;
            font-size: 17px;
            outline: none;
            background: transparent;
            color: #333;
            font-weight: 400;
        }
        
        .search-box input::placeholder {
            color: #999;
        }
        
        .search-box .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .search-box .search-btn svg {
            width: 28px;
            height: 28px;
        }
        
        .search-box .search-btn:hover {
            transform: translateY(-50%) scale(1.08);
        }
        
        .search-box .search-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        /* 每日一言 - 简洁版 */
        .daily-quote {
            max-width: 600px;
            text-align: center;
            padding: 20px 25px;
            margin: 35px 20px 0;
        }
        
        .quote-text {
            font-size: 15px;
            line-height: 1.8;
            color: rgba(255,255,255,0.9);
            font-weight: 400;
            letter-spacing: 1px;
        }
        
        /* 底部 */
        .footer {
            position: fixed;
            bottom: 15px;
            font-size: 11px;
            opacity: 0.5;
            text-align: center;
            letter-spacing: 1px;
        }
        
        /* 手机端优化 */
        @media (max-width: 768px) {
            body {
                justify-content: flex-start;
                padding-top: 80px;
            }
            
            .weather-info {
                top: 10px;
                left: 10px;
                padding: 10px 14px;
                min-width: 130px;
            }
            
            .weather-temp { font-size: 17px; }
            .weather-icon { font-size: 19px; }
            
            .datetime-container {
                padding: 15px 20px;
                margin-bottom: 30px;
            }
            
            .time {
                font-size: 52px;
                letter-spacing: 4px;
                font-weight: 600;
            }
            
            .date {
                font-size: 13px;
                letter-spacing: 1px;
                margin-top: 10px;
                display: block;
            }
            
            .date-lunar {
                display: block;
                margin-left: 0;
                margin-top: 6px;
                font-size: 13px;
            }
            
            .search-box {
                max-width: calc(100% - 30px);
                padding: 6px;
                margin: 0 15px;
            }
            
            .search-box input {
                padding: 14px 16px;
                padding-right: 55px;
                font-size: 16px;
            }
            
            .search-box .search-btn {
                width: 38px;
                height: 38px;
                right: 8px;
            }
            
            .search-box .search-btn svg {
                width: 24px;
                height: 24px;
            }
            
            .daily-quote {
                padding: 15px 18px;
                margin: 25px 15px 0;
            }
            
            .quote-text {
                font-size: 14px;
                line-height: 1.7;
            }
            
            .footer {
                font-size: 10px;
                bottom: 10px;
            }
        }
        
        /* 小屏幕手机 */
        @media (max-width: 400px) {
            .time { font-size: 44px; letter-spacing: 2px; }
            .date { font-size: 12px; }
            .date-lunar { font-size: 11px; }
            .weather-info { font-size: 11px; }
            .weather-temp { font-size: 16px; }
        }
    </style>
</head>
<body>
    <!-- 天气信息 -->
    <div class="weather-info" id="weatherInfo">

        <div class="weather-main">
            <span class="weather-icon">🌡️</span>

    <!-- 底部 -->
    <div class="footer">

    <script>

            0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0
        ];
        
        const tianGan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
        const diZhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
        const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
        
        function getLunarYear(year) {
            return tianGan[(year - 4) % 10] + diZhi[(year - 4) % 12] + '年';
        }
        
        function lunarDay(day) {
            const nStr1 = ['初','十','廿','卅'];
            const nStr2 = ['','十','二十','三十'];
            if (day === 10) return '初十';
            if (day === 20) return '二十';
            if (day === 30) return '三十';
            return nStr1[Math.floor((day-1)/10)] + nStr2[(day-1)%10];
        }
        
        function dateToLunar(date) {
            let year = date.getFullYear();
            let month = date.getMonth() + 1;
            let day = date.getDate();
            
            let offset = (Date.UTC(year, month-1, day) - Date.UTC(1900, 0, 31)) / 86400000;
            let lunarYear, lunarMonth, lunarDay;
            
            for (let i = 0; i < lunarInfo.length; i++) {
                let days = (lunarInfo[i] & 0x0f) === 0x0f ? 384 : 354;
                if (offset <= days) {
                    lunarYear = 1900 + i;
                    break;
                }
                offset -= days;
            }
            
            let isLeap = false;
            let leapMonth = (lunarInfo[lunarYear - 1900] >> 4) & 0x0f;
            
            for (let i = 0; i <= 12; i++) {
                let monthDays = ((lunarInfo[lunarYear - 1900] >> (15 - i)) & 0x01) === 1 ? 30 : 29;
                if (i === leapMonth) {
                    isLeap = true;
                    let leapDays = ((lunarInfo[lunarYear - 1900] >> (15 - i - 1)) & 0x01) === 1 ? 30 : 29;
                    if (offset < leapDays) {
                        lunarMonth = i;
                        lunarDay = Math.floor(offset) + 1;
                        isLeap = true;
                        break;
                    }
                    offset -= leapDays;
                }
                if (offset < monthDays) {
                    lunarMonth = i;
                    lunarDay = Math.floor(offset) + 1;
                    break;
                }
                offset -= monthDays;
            }
            
            const yearGanZhi = getLunarYear(lunarYear);
            const monthStr = (isLeap ? '闰' : '') + lunarMonths[lunarMonth - 1] + '月';
            const dayStr = lunarDay(lunarDay);
            
            return { year: yearGanZhi, month: monthStr, day: dayStr };
        }
        
        // ===== 时间功能 =====
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = 
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0') + ':' +
                String(now.getSeconds()).padStart(2,'0');
            
            // 公历年月日
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            const week = weekDays[now.getDay()];
            
            // 农历
            const lunar = dateToLunar(now);
            
            document.getElementById('date').innerHTML = 
                year + '年' + month + '月' + day + '日 ' + week +
                '<span class="date-lunar">' + lunar.year + lunar.month + lunar.day + '</span>';
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // ===== 百度搜索 =====
        function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if(q) {
                window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(q), '_blank');
            }
        }
        
        // ===== 每日一言 =====
        async function fetchQuote() {
            try {
                const res = await fetch('https://v1.hitokoto.cn/?c=d&c=i&c=k&max_length=50');
                const data = await res.json();
                document.getElementById('quoteText').textContent = '"' + data.hitokoto + '"';
            } catch(e) {
                const quotes = [
                    '生活不止眼前的苟且，还有诗和远方。',
                    '人生没有彩排，每一天都是现场直播。',
                    '越努力，越幸运。',
                    '心若向阳，无惧悲伤。',
                    '简单生活，快乐自来。',
                    '不忘初心，方得始终。',
                    '未来可期，人间值得。'
                ];
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById('quoteText').textContent = '"' + q + '"';
            }
        }
        fetchQuote();

async function fetchWeatherAndLocation() {
  try {
    let city = '北京';
    let region = '北京';
    let country = '中国';
    let lat = 39.9042;
    let lon = 116.4074;
    let ipSuccess = false;

    // 尝试主 API (ip-api.com 不限流)
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);
      const ipRes = await fetch('https://ip-api.com/json/?lang=zh-CN', {
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      if (ipRes.ok) {
        const ipData = await ipRes.json();
        if (ipData.status === 'success') {
          city = ipData.city || '北京';
          region = ipData.regionName || '北京';
          country = ipData.country || '中国';
          lat = ipData.lat || 39.9042;
          lon = ipData.lon || 116.4074;
          ipSuccess = true;
        }
      }
    } catch (e) {
      console.log('主 IP API 失败，尝试备用 API');
    }

    // 如果主 API 失败，尝试备用 API
    if (!ipSuccess) {
      try {
        const backupRes = await fetch('https://ipwho.is/');
        const backupData = await backupRes.json();
        if (backupData.success) {
          city = backupData.city || city;
          region = backupData.region || region;
          country = backupData.country || country;
          lat = backupData.latitude || lat;
          lon = backupData.longitude || lon;
          ipSuccess = true;
        }
      } catch (e) {
        console.log('备用 IP API 失败，使用默认值（北京）');
      }
    }

    // 第二步：获取天气
    if (ipSuccess) {
      try {
        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&windspeed_unit=kmh`
        );
        if (weatherRes.ok) {
          const weatherData = await weatherRes.json();
          if (weatherData.current_weather) {
            const w = weatherData.current_weather;
            const icons = {
              0: ['☀️', '晴朗'], 1: ['🌤️', '多云'], 2: ['⛅', '少云'], 3: ['☁️', '阴天'],
              45: ['🌫️', '雾'], 48: ['🌫️', '雾凇'], 51: ['🌦️', '小雨'], 53: ['🌦️', '中雨'],
              55: ['🌦️', '大雨'], 61: ['🌧️', '小雨'], 63: ['🌧️', '中雨'], 65: ['🌧️', '大雨'],
              71: ['🌨️', '小雪'], 73: ['🌨️', '中雪'], 75: ['🌨️', '大雪'], 80: ['🌦️', '阵雨'],
              81: ['🌧️', '中雨'], 82: ['⛈️', '暴雨'], 95: ['⛈️', '雷雨'], 96: ['⛈️', '雷阵雨'], 99: ['⛈️', '大暴雨']
            };
            const [icon, desc] = icons[w.weathercode] || ['🌤️', '多云'];
            document.getElementById('weatherInfo').innerHTML = `<div class="weather-location">📍 ${city}${city !== region ? ' · ' + region : ''}</div><div class="weather-main"><span class="weather-icon">${icon}</span><span class="weather-temp">${w.temperature}°C</span></div><div class="weather-extra">${desc} 💨 ${w.windspeed}km/h</div>`;
            document.getElementById('weatherExtra').textContent = desc + ' 💨 ' + w.windspeed + 'km/h';
          }
        }
      } catch (e) {
        console.log('天气 API 失败');
      }
    }
  } catch (e) {
    console.error('天气获取完全失败:', e);
  }
}
